name: Update Ecommerce News Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: update-ecommerce-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare OPML
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
            echo "Loaded feeds/follow.opml from FOLLOW_OPML_B64 secret"
          elif [ -f feeds/ecommerce.example.opml ]; then
            cp feeds/ecommerce.example.opml feeds/follow.opml
            echo "Loaded public ecommerce OPML from feeds/ecommerce.example.opml"
          else
            echo "No OPML file available; RSS OPML is optional"
          fi

      - name: Update data
        env:
          EMAIL_DIGEST_ENABLED: ${{ secrets.EMAIL_DIGEST_ENABLED || vars.EMAIL_DIGEST_ENABLED }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
          AGENTMAIL_API_BASE_URL: ${{ vars.AGENTMAIL_API_BASE_URL }}
          AGENTMAIL_LIMIT: ${{ vars.AGENTMAIL_LIMIT }}
          AGENTMAIL_ALLOWED_SENDER_DOMAINS: ${{ vars.AGENTMAIL_ALLOWED_SENDER_DOMAINS }}
          X_API_ENABLED: ${{ secrets.X_API_ENABLED || vars.X_API_ENABLED }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_QUERY: ${{ vars.X_API_QUERY }}
          X_API_MAX_RESULTS: ${{ vars.X_API_MAX_RESULTS }}
          X_API_DAILY_POST_LIMIT: ${{ vars.X_API_DAILY_POST_LIMIT }}
          X_API_RUN_UTC_HOUR: ${{ vars.X_API_RUN_UTC_HOUR }}
          X_API_RUN_UTC_MINUTE_MAX: ${{ vars.X_API_RUN_UTC_MINUTE_MAX }}
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS || 0 }}
          WEB_MAX_SOURCES: ${{ vars.WEB_MAX_SOURCES || 0 }}
        run: |
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py --topic ecommerce --output-dir data --window-hours 168 --archive-days 21 --rss-opml feeds/follow.opml --rss-max-feeds "${RSS_MAX_FEEDS:-0}" --web-sources feeds/ecommerce.web-sources.json --web-max-sources "${WEB_MAX_SOURCES:-0}"
          else
            python scripts/update_news.py --topic ecommerce --output-dir data --window-hours 168 --archive-days 21 --web-sources feeds/ecommerce.web-sources.json --web-max-sources "${WEB_MAX_SOURCES:-0}"
          fi

      - name: 采集抖音电商官方规则公告
        run: |
          python scripts/douyin_fetcher.py --output data/douyin-rules.json --window-hours 168
          # 把抖音规则条目注入 latest-24h.json（追加到 items_ai 和 items 数组）
          python - << 'PYEOF'
import json, pathlib, datetime, sys

douyin_path = pathlib.Path('data/douyin-rules.json')
news_path = pathlib.Path('data/latest-24h.json')
if not douyin_path.exists() or not news_path.exists():
    print('Skip merge: files missing')
    sys.exit(0)

douyin = json.loads(douyin_path.read_text(encoding='utf-8'))
news = json.loads(news_path.read_text(encoding='utf-8'))

new_items = douyin.get('items', [])
if not new_items:
    print('No Douyin items to merge')
    sys.exit(0)

existing_ids = {i.get('id') for i in news.get('items', [])}
to_add = [i for i in new_items if i.get('id') not in existing_ids]

news.setdefault('items', [])
news.setdefault('items_ai', [])
news['items'] = to_add + news['items']
# 高分项目（抖音规则都是 ai_score=0.85）也进 items_ai
ai_existing = {i.get('id') for i in news['items_ai']}
news['items_ai'] = [i for i in to_add if i.get('id') not in ai_existing] + news['items_ai']

news_path.write_text(json.dumps(news, ensure_ascii=False, indent=2), encoding='utf-8')
print(f'Merged {len(to_add)} Douyin rule items into latest-24h.json')
PYEOF

      - name: LLM 二次打分（MiniMax 主力 + Mimo 备用）
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        run: |
          if [ -z "$MINIMAX_API_KEY" ] && [ -z "$MIMO_API_KEY" ]; then
            echo "MINIMAX_API_KEY/MIMO_API_KEY 均未配置，跳过 LLM 二次打分"
            exit 0
          fi
          python scripts/llm_scorer.py --file data/ai-radar.json
          python scripts/llm_scorer.py --file data/latest-24h.json

      - name: Feishu 精选实时提醒
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          if [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ] || [ -z "$FEISHU_CHAT_ID" ]; then
            echo "飞书 secrets 未配置完整，跳过精选实时提醒"
            exit 0
          fi
          python scripts/feishu_alert.py

      - name: Feishu 每日日报（北京时间 09:00）
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          if [ -z "$FEISHU_APP_ID" ] || [ -z "$FEISHU_APP_SECRET" ] || [ -z "$FEISHU_CHAT_ID" ]; then
            echo "飞书 secrets 未配置完整，跳过每日日报"
            exit 0
          fi
          # 北京时间 09:00 = UTC 01:00，窗口 01:00-01:29（与 cron 30min 对齐）
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" = "01" ] && [ "$MIN" -lt 30 ]; then
            echo "触发每日日报推送"
            python scripts/feishu_push.py --top 10
          else
            echo "非日报时间窗口（UTC ${HOUR}:${MIN}），跳过"
          fi

      - name: Commit and push changes
        env:
          EMAIL_DIGEST_PUBLISH: ${{ secrets.EMAIL_DIGEST_PUBLISH || vars.EMAIL_DIGEST_PUBLISH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage the whole data dir so newly added output files can never be
          # silently dropped again (the daily-brief/stories-merged freeze was
          # caused by a stale filename whitelist here). .gitignore keeps
          # data/email-digest.json out of this add.
          git add data/
          if [ -f data/email-digest.json ] && [ "$EMAIL_DIGEST_PUBLISH" = "1" ]; then
            git add -f data/email-digest.json
          fi
          # Self-check: fail loudly if anything under data/ is still unstaged,
          # instead of green-but-stale runs.
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Generated files under data/ were not staged:"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ecommerce news snapshot"
          git push
